name: Android Build

on:
  push:
    branches: [ master, main ]
  pull_request:
    branches: [ master, main ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Set up JDK 17
      uses: actions/setup-java@v4
      with:
        java-version: '17'
        distribution: 'temurin'

    - name: Setup Gradle 8.5
      uses: gradle/actions/setup-gradle@v3
      with:
        gradle-version: '8.5'

    - name: Initialize Gradle Wrapper
      run: |
        cd ${{ github.workspace }}
        # Use gradle directly to generate wrapper
        gradle wrapper --gradle-version 8.5

    - name: Build debug APK
      run: |
        cd ${{ github.workspace }}
        ./gradlew assembleDebug --no-daemon --stacktrace

    - name: Upload APK
      uses: actions/upload-artifact@v4
      if: success()
      with:
        name: sonorita-debug-apk
        path: app/build/outputs/apk/debug/*.apk

  lint:
    runs-on: ubuntu-latest
    
    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Set up JDK 17
      uses: actions/setup-java@v4
      with:
        java-version: '17'
        distribution: 'temurin'

    - name: Setup Gradle
      uses: gradle/actions/setup-gradle@v3
      with:
        gradle-version: '8.5'

    - name: Initialize Gradle Wrapper
      run: |
        cd ${{ github.workspace }}
        gradle wrapper --gradle-version 8.5

    - name: Run lint
      run: |
        cd ${{ github.workspace }}
        ./gradlew lint --no-daemon || true

    - name: Upload lint results
      uses: actions/upload-artifact@v4
      if: always()
      with:
        name: lint-results
        path: app/build/reports/lint-results*.html
